#
# Gradle wrapper config.
#
# Pinning Gradle 8.7 — the matching version for AGP 8.5.x per the
# Android Gradle Plugin compatibility matrix. Bump in lockstep when
# upgrading AGP.
#
# distributionBase + zipStoreBase use the user's GRADLE_USER_HOME
# (default: ~/.gradle); distributionPath + zipStorePath are sub-
# directories of that, keeping multiple gradle versions side-by-side
# without churn.
#
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
