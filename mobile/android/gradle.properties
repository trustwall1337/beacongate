# Gradle JVM options. -Xmx2g is generous for this small project but
# matches what AGP 8.x expects on first sync; lower values stall
# during the initial dependency resolution.
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8

# AndroidX is mandatory for AGP 8.x; declared explicitly so the
# Android tooling doesn't print a warning during sync.
android.useAndroidX=true

# Kotlin code style (4-space indent, official Kotlin conventions).
kotlin.code.style=official

# Enable Gradle's parallel project execution. For a single-module
# project this is a no-op today; matters once we add tests or
# additional modules.
org.gradle.parallel=true

# Configure-on-demand: only configure projects that are needed for
# the current build. Cheap win for incremental builds.
org.gradle.configureondemand=true
