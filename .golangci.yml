# golangci-lint v2 configuration for BeaconGate.
# Conservative defaults that match real-world Go monorepo style.
# See https://golangci-lint.run/usage/configuration/ for the full schema.

version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck       # unchecked errors
    - govet          # standard go vet
    - ineffassign    # ineffectual assignments
    - staticcheck    # broad correctness checks
    - unused         # unused declarations
    - revive         # replacement for golint
    - gocritic       # style/perf/diagnostic checks
    - bodyclose      # http response body must be closed
    - misspell       # common spelling mistakes
    - unconvert      # redundant conversions
    - prealloc       # slice preallocation hints
    - gosec          # security checks (subset)
  settings:
    revive:
      rules:
        - name: var-naming
        - name: error-return
        - name: error-strings
        - name: receiver-naming
        - name: indent-error-flow
        - name: increment-decrement
        - name: range-val-in-closure
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      # Style checks intentionally NOT enabled. The bodies of the
      # checks below were judged net-negative for this codebase:
      # - hugeParam / rangeValCopy: protocol message structs are
      #   passed by value across many call sites by design (the
      #   immutability discipline matters more than the copy cost
      #   at our message rates).
      # - unnamedResult / paramTypeCombine / deferInLoop /
      #   ifElseChain: pure style; project chose explicit forms.
      # - httpNoBody: `nil` body is idiomatic Go and stdlib's
      #   own examples use it.
      # - builtinShadow: `cap` is shadowed deliberately in a few
      #   spots where the local meaning is "capacity" not the
      #   builtin.
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - unnamedResult
        - paramTypeCombine
        - deferInLoop
        - ifElseChain
        - httpNoBody
        - builtinShadow
    gosec:
      excludes:
        - G104  # unhandled errors — errcheck already covers this with more nuance
        - G404  # not all rand uses need crypto/rand; we use crypto/rand where it matters
        - G114  # http.ListenAndServe without timeouts: the loopback control API uses it deliberately (loopback-only, short-lived)
        - G115  # integer overflow conversions: every site is bounded by the wire format's documented limits
        - G304  # file inclusion via variable: every read is operator-controlled config / cert path
  exclusions:
    paths:
      - docs
      - ops
      - desktop
      - mobile
      - protocol
      - tools
    rules:
      # Tests can be more relaxed.
      - path: _test\.go$
        linters:
          - errcheck
          - gosec
          - prealloc
      # Generated wire types may have a lot of fields by design.
      - path: engine/protocol/encode\.go$
        linters:
          - gocritic

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/trustwall1337/beacongate

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
